name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc librsvg2-bin

      - name: Install runtime dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Validate and test
        run: |
          python3 scripts/validate_skill_portfolio.py
          python3 scripts/run_portfolio_tests.py

      - name: Build release package
        run: python3 scripts/package_skill_pack.py

      - name: Validate changelog contains release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "^## \\[${VERSION}\\]" CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/consulting-workflows.zip
          generate_release_notes: true
