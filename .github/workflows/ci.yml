name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate skill portfolio
        run: python3 scripts/validate_skill_portfolio.py

      - name: Install test dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run portfolio tests
        run: python3 scripts/run_portfolio_tests.py
